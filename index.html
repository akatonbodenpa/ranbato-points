<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ランバト 獲得ポイント計算ツール</title>
    <meta
      name="description"
      content="連勝数、自分のポイント、相手のポイントから勝敗時の獲得ポイントを即時計算するサイトです。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="page-title">
      <section class="hero">
        <p class="eyebrow">Battle Rating Calculator</p>
        <h1 id="page-title">ランバト 獲得ポイント計算ツール</h1>
        <p class="lead">
          「連勝数」「自分のポイント」「相手のポイント」を入力すると、勝った場合と負けた場合のポイント変動を即座に表示します。
        </p>
      </section>

      <section class="calculator" aria-label="ポイント計算フォーム">
        <form id="rating-form" class="form" novalidate>
          <label class="field" for="win-streak">
            <span>連勝数</span>
            <select id="win-streak" name="winStreak">
              <option value="1">1勝 (連勝無し)</option>
              <option value="2">2連勝</option>
              <option value="3">3連勝</option>
              <option value="4">4連勝</option>
              <option value="5">5連勝以上</option>
            </select>
            <span class="field-note">※連勝数はその試合に勝てた場合の連勝数を選択してください</span>
          </label>

          <label class="field" for="my-points">
            <span>自分のポイント</span>
            <input id="my-points" name="myPoints" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="5" value="0" />
          </label>

          <label class="field" for="opponent-points">
            <span>相手のポイント</span>
            <input id="opponent-points" name="opponentPoints" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="5" value="0" />
          </label>
        </form>

        <div id="error-message" class="error" role="alert" hidden></div>

        <div class="results" aria-live="polite">
          <article class="result-card win">
            <span class="result-label">勝利時：</span>
            <span class="result-caption">獲得ポイント</span>
            <output id="win-result" class="result-value" for="win-streak my-points opponent-points">0pt</output>
            <span class="result-spacer" aria-hidden="true"></span>
            <span class="result-after-label">獲得後の自分のポイント：</span>
            <output id="win-after-result" class="result-after-value" for="win-streak my-points opponent-points">0pt</output>
          </article>

          <article class="result-card lose">
            <span class="result-label">敗北時：</span>
            <span class="result-caption">獲得ポイント</span>
            <output id="lose-result" class="result-value" for="win-streak my-points opponent-points">0pt</output>
            <span class="result-spacer" aria-hidden="true"></span>
            <span class="result-after-label">獲得後の自分のポイント：</span>
            <output id="lose-after-result" class="result-after-value" for="win-streak my-points opponent-points">0pt</output>
          </article>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
